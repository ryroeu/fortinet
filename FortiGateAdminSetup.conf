############################
# INITIAL SETUP
# Target: FortiOS 8.0.0
############################

# Confirm the installed firmware before using these examples.
get system status

# Enable SSH access while connected through the local console. Restrict the
# administrator account with trusted hosts and use a management-only network.
config system interface
    edit <management_interface>
        append allowaccess ssh
    next
end

# Show the selected interface configuration.
show system interface <interface_name>

# Configure a static management interface.
config system interface
    edit "port2"
        set mode static
        set ip 203.0.113.99 255.255.255.0
        set allowaccess ping https ssh
        set alias "Management"
    next
end

# Configure the hostname.
config system global
    set hostname "200F-YVR"
end

# Configure a default route. The gateway must be reachable through port1.
config router static
    edit 0
        set gateway 192.168.1.254
        set device "port1"
    next
end

# Test Internet and FortiGuard connectivity.
execute ping <domain.example>

# Activate FortiCloud with an activation code.
execute fortiguard-log certificate-activation <activation_code>

# Reset all configuration to factory defaults and reboot.
execute factoryreset

# Reset to factory defaults while retaining the VDOM, interface, system
# settings, static route, and virtual-switch configuration documented by 8.0.0.
execute factoryreset2
