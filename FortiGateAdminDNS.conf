############################
# MANAGING DNS
# Target: FortiOS 8.0.0
############################

# Configure system DNS. protocol accepts one or more of cleartext, dot, and
# doh; use only transports supported by the selected upstream resolvers.
config system dns
    set primary <primary_ipv4>
    set secondary <secondary_ipv4>
    set protocol {cleartext | dot | doh}
    set ssl-certificate <local_certificate>
    set server-hostname <resolver_hostname_1> <resolver_hostname_2>
    set domain <search_domain_1> <search_domain_2>
    set ip6-primary <primary_ipv6>
    set ip6-secondary <secondary_ipv6>
    set timeout <1-10>
    set retry <0-5>
    set dns-cache-limit <entries>
    set dns-cache-ttl <seconds>
    set cache-notfound-responses {enable | disable}
    set server-select-method {least-rtt | failover}
    set interface-select-method {auto | sdwan | specify}
    set interface <outgoing_interface>
    set source-ip <source_ipv4>
end

# Set the DNS proxy process count. The maximum depends on logical CPU count and
# the FortiGate model.
config system global
    set dnsproxy-worker-count <worker_count>
end

# Override DNS for a non-management VDOM in multi-VDOM mode.
config vdom
    edit <vdom_name>
        config system vdom-dns
            set vdom-dns enable
            set primary <primary_ipv4>
            set secondary <secondary_ipv4>
            set protocol {cleartext | dot | doh}
            set ip6-primary <primary_ipv6>
            set ip6-secondary <secondary_ipv6>
            set server-select-method {least-rtt | failover}
            set interface-select-method {auto | sdwan | specify}
            set interface <outgoing_interface>
            set source-ip <source_ipv4>
        end
    next
end

# Configure the DNS search-domain list.
config system dns
    set primary 96.45.45.45
    set secondary 96.45.46.46
    set domain "sample.com" "example.com" "domainname.com"
end

# Configure DNS timeout and retry values.
config system dns
    set timeout <1-10>
    set retry <0-5>
end

# Configure a local primary DNS zone with FortiOS 8.0.0 terminology.
config system dns-database
    edit "WebServer"
        set domain "example.com"
        set type primary
        set view shadow
        set ttl 86400
        set primary-name "dns1.example.com"
        set contact "admin@example.com"
        set authoritative disable
        config dns-entry
            edit 1
                set status enable
                set hostname "web.example.com"
                set type A
                set ip 192.0.2.12
            next
        end
    next
end

# Serve the shadow zone recursively on an internal interface.
config system dns-server
    edit "port2"
        set mode recursive
    next
end

# Configure FortiGuard DDNS for IPv4.
config system ddns
    edit <ddns_id>
        set ddns-server FortiGuardDDNS
        set server-type ipv4
        set ddns-domain "branch.float-zone.com"
        set addr-type ipv4
        set use-public-ip enable
        set monitor-interface "wan1"
    next
end

# Configure FortiGuard DDNS for IPv6.
config system ddns
    edit <ddns_id>
        set ddns-server FortiGuardDDNS
        set server-type ipv6
        set ddns-domain "branch-v6.float-zone.com"
        set addr-type ipv6
        set monitor-interface "wan1"
    next
end

# Configure a non-FortiGuard DDNS provider. Available fields depend on the
# selected provider.
config system ddns
    edit <ddns_id>
        set monitor-interface <external_interface>
        set ddns-server <provider>
        set server-type {ipv4 | ipv6}
        set ddns-server-addr <server_address>
        set addr-type {ipv4 | ipv6}
        set ddns-domain <fqdn>
        set ddns-username <username>
        set ddns-password <password>
    next
end

# Configure an IPv6 generic RFC 2136 DDNS client.
config system ddns
    edit <ddns_id>
        set ddns-server genericDDNS
        set server-type ipv6
        set ddns-server-addr "2001:db8:53::2" "ddns.example.com"
        set ddns-domain "host.example.com"
        set addr-type ipv6
        set monitor-interface "port3"
    next
end

# Periodically refresh a public-IP DDNS record.
config system ddns
    edit <ddns_id>
        set use-public-ip enable
        set update-interval <60-2592000>
    next
end

# Require TLS for DDNS updates and select the client certificate.
config system ddns
    edit <ddns_id>
        set clear-text disable
        set ssl-certificate <certificate_name>
    next
end

# Force DHCP-triggered DDNS updates.
config system dhcp server
    edit <dhcp_server_id>
        set ddns-update enable
        set ddns-update-override enable
        set ddns-server-ip <ddns_server_ipv4>
        set ddns-zone <ddns_zone>
    next
end

# Send FortiGate local-out DNS queries over TLS.
config system dns
    set primary 1.1.1.1
    set secondary 1.0.0.1
    set protocol dot
    set server-hostname "cloudflare-dns.com"
end

# Enable encrypted DNS services on an internal interface. In FortiOS 8.0.0, the
# server certificate belongs here under ssl-cert. DoT is available implicitly;
# these switches additionally enable DoH, DoH3, and DoQ listeners.
config system dns-server
    edit "port2"
        set mode recursive
        set dnsfilter-profile "dnsfilter"
        set doh enable
        set doh3 enable
        set doq enable
        set ssl-cert <server_certificate>
    next
end
