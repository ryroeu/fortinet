############################
# MANAGING BACKUPS
# Target: FortiOS 8.0.0
############################

# Back up to and restore from an SCP server. These are native FortiOS 8.0.0
# commands; the optional final password encrypts the configuration file.
execute backup config scp <backup_filename> <scp_server>[<:port>] <user> <password> [<backup_password>]
execute restore config scp <backup_filename> <scp_server>[<:port>] <user> <password> [<backup_password>]

# Back up to FortiManager or FortiGate Cloud, list revisions, and restore one.
execute backup config management-station <comment>
execute restore config management-station normal 0
execute restore config management-station normal <revision_id>

# Use local flash revision storage on models that contain a supported disk.
execute backup config flash <comment>
execute revision list config
execute restore config flash <revision_id>

# Back up to and restore from USB.
execute backup config usb <backup_filename> [<backup_password>]
execute restore config usb <backup_filename> [<backup_password>]

# FTP is unencrypted; use only on an isolated management network.
execute backup config ftp <backup_filename> <ftp_server>[<:port>] [<user>] [<password>] [<backup_password>]
execute restore config ftp <backup_filename> <ftp_server>[<:port>] [<user>] [<password>] [<backup_password>]

# TFTP is unencrypted and has no authentication.
execute backup config tftp <backup_filename> <tftp_server> [<backup_password>]
execute restore config tftp <backup_filename> <tftp_server> [<backup_password>]

# FortiOS 8.0.0 supports SFTP as a backup destination, but not as a restore
# source. Restore the file with SCP, FTP, TFTP, USB, or the GUI instead.
execute backup config sftp <backup_filename> <sftp_server>[<:port>] <user> <password> [<backup_password>]

# FortiOS 8.0.0 YAML exports support FTP and TFTP destinations. The final
# password encrypts the YAML content.
execute backup yaml-config ftp <filename> <ftp_server>[<:port>] [<user>] [<password>] [<backup_password>]
execute backup yaml-config tftp <filename> <tftp_server> [<backup_password>]

# FortiOS 8.0.0 automatically detects FortiOS and YAML formats during restore;
# this example restores a YAML file that has been placed on an SCP server.
execute restore config scp <yaml_filename> <scp_server>[<:port>] <user> <password> [<backup_password>]

# Mask secrets before sharing a diagnostic configuration. An obfuscated export
# is not a disaster-recovery backup because masked secrets cannot be recovered.
execute backup obfuscated-config sftp <backup_filename> <sftp_server>[<:port>] <user> <password> [<backup_password>]

# Include settings at their default values in a full configuration export.
execute backup full-config sftp <backup_filename> <sftp_server>[<:port>] <user> <password> [<backup_password>]
