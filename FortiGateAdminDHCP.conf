############################
# MANAGING DHCP
# Target: FortiOS 8.0.0
############################

# Configure a DHCP server. Prerequisite: port1 uses 192.168.10.1/24.
config system dhcp server
    edit <dhcp_server_id>
        set status enable
        set interface "port1"
        set default-gateway 192.168.10.1
        set netmask 255.255.255.0
        set dns-service default
        set lease-time 86400
        config ip-range
            edit 1
                set start-ip 192.168.10.100
                set end-ip 192.168.10.199
            next
        end
        set timezone-option default
        set next-server 192.168.10.10
        set filename "bootfile.efi"
    next
end

# Configure a DHCP relay. The FortiGate must have a route to the relay server.
config system interface
    edit "port2"
        set mode static
        set ip 10.1.1.5 255.255.255.0
        set dhcp-relay-service enable
        set dhcp-relay-ip "192.168.20.10"
    next
end

# Disable an existing DHCP server without replacing its other settings.
config system dhcp server
    edit <existing_dhcp_server_id>
        set status disable
    next
end
