############################
# MANAGING CERTIFICATES
# Target: FortiOS 8.0.0
############################

# Export a local certificate, PKCS#12 bundle, or signing request to SCP.
# File types: cer = public certificate; p12 = certificate and private key;
# csr = certificate signing request. Protect every p12 export with a password.
execute vpn certificate local export scp <certificate_name> {cer | p12 | csr} <filename> <scp_server>[<:port>] <user> <password>

# Import a signed certificate or PKCS#12 bundle from SCP. The final password is
# required when the p12 file is password protected.
execute vpn certificate local import scp <scp_server>[<:port>] <user> <password> <filename> {cer | p12} [<p12_password>]

# Verify that an imported certificate matches its private key.
execute vpn certificate local verify <certificate_name>
